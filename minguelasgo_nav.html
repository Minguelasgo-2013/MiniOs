<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Minguelsgo Nav</title><style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: "Arial", sans-serif; font-size: 12px; user-select: none; } body, html { width: 100%; height: 100%; overflow: hidden; background-color: #008080; position: relative; display: flex; justify-content: center; align-items: center; }
#log-scr { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #008080; display: flex; justify-content: center; align-items: center; z-index: 999; } .card { background: #c0c0c0; border-top: 2px solid #fff; border-left: 2px solid #fff; border-right: 2px solid #000; border-bottom: 2px solid #000; padding: 15px; width: 320px; }
.title { background: linear-gradient(90deg, #000080, #1084d0); color: white; padding: 3px 6px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; } .content { display: flex; gap: 15px; color: #000; }
.avatar { width: 45px; height: 45px; background: #808080; border-top: 2px solid #000; border-left: 2px solid #000; border-right: 2px solid #fff; border-bottom: 2px solid #fff; } .form-group { flex-grow: 1; } .form-group label { display: block; margin-bottom: 5px; color: #000; }
input { width: 100%; padding: 3px; margin-bottom: 8px; border-top: 2px solid #808080; border-left: 2px solid #808080; border-right: 2px solid #fff; border-bottom: 2px solid #fff; background: #fff; outline: none; color: #000; }
button { padding: 4px 15px; background: #c0c0c0; border-top: 2px solid #fff; border-left: 2px solid #fff; border-right: 2px solid #000; border-bottom: 2px solid #000; cursor: pointer; color: #000; font-weight: bold; } button:active { border-top: 2px solid #000; border-left: 2px solid #000; border-right: 2px solid #fff; border-bottom: 2px solid #fff; } .form-group button { float: right; }
#nav-app { width: 100%; height: 100%; background: #c0c0c0; display: flex; flex-direction: column; padding: 3px; }
.win-body { padding: 10px; flex-grow: 1; background: #fff; border-top: 2px solid #808080; border-left: 2px solid #808080; border-right: 2px solid #fff; border-bottom: 2px solid #fff; color: #000; overflow-y: auto; } .sec { margin-bottom: 15px; user-select: text; } .sec h2 { font-size: 13px; margin-bottom: 8px; border-bottom: 2px dashed #808080; padding-bottom: 2px; color: #555; }
.n-card { background: #f0f0f0; border: 2px solid #808080; padding: 10px; margin-bottom: 8px; border-radius: 4px; } .n-card h3 { font-size: 12px; color: #000080; margin-bottom: 3px; } .n-card p { margin-bottom: 6px; color: #333; font-size: 11px; } .n-card button { padding: 3px 10px; font-size: 11px; font-weight: bold; float: none; }
</style></head><body>
<div id="log-scr"><div class="card"><div class="title"><span>Minguelsgo Nav - Login</span></div><div class="content"><div class="avatar"></div><div class="form-group"><label>Acceso al Navegador</label><label for="p-in">Contraseña:</label><input type="password" id="p-in" autofocus><button type="button" id="go-btn">Entrar</button></div></div></div></div>
<div id="nav-app"><div class="win-body">
    <div class="sec"><h2>📂 PORTALES OFICIALES MINGUEROS</h2>
        <div class="n-card"><h3>GITHUB REPOSITORY</h3><p>Accede de forma directa a tu repositorio donde guardas este Mini OS 95.</p><button type="button" onclick="window.open('https://github.com','_blank')">ABRIR ENLACE</button></div>
    </div>
    <div class="sec"><h2>🔍 MOTORES DE BÚSQUEDA SECUNDARIOS</h2>
        <div class="n-card"><h3>GOOGLE WEB</h3><p>Si necesitas salir de la red interna de Minguelsgo, usa el buscador global de Google.</p><button type="button" onclick="window.open('https://google.com','_blank')">ABRIR ENLACE</button></div>
    </div>
</div></div>
<script>
const loginNav = () => { if (document.getElementById('p-in').value === "1234") { document.getElementById('log-scr').style.display = 'none'; } else { alert("Incorrecta"); document.getElementById('p-in').value = ""; document.getElementById('p-in').focus(); } };
document.getElementById('go-btn').addEventListener('click', loginNav); document.getElementById('p-in').addEventListener('keypress', (e) => { if (e.key === 'Enter') loginNav(); });
</script></body></html>
