<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mini OS Windows 95</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PANTALLA DE LOGUEO (CONTRASEÑA: 1234) -->
    <div id="login-screen">
        <div class="login-card">
            <div class="window-title">
                <span>Inicio de Sesión</span>
                <span>X</span>
            </div>
            <div class="login-content">
                <div class="user-avatar-box"></div>
                <div class="login-form-group">
                    <label>Usuario: <strong>Administrador</strong></label>
                    <label for="password-input">Contraseña:</label>
                    <input type="password" id="password-input">
                    <button type="button" id="login-btn">Aceptar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ESCRITORIO PRINCIPAL -->
    <div id="desktop">
        <!-- Icono con Carpeta CSS Puro -->
        <div class="icon" id="folder-icon">
            <div class="folder-css"></div>
            <span>Archivador</span>
        </div>

        <!-- Ventana del Archivador -->
        <div class="window" id="archivador-window">
            <div class="window-title">
                <span>Minguelasgo Archivator</span>
                <div class="close-btn" id="close-archivador-btn">X</div>
            </div>
            <div class="window-body">
                <div>Ruta: C:\Archivador</div>
                <hr style="margin: 8px 0; border: 0; border-top: 1px solid #808080;">
                <ul class="file-list">
                    <li class="file-item">📄 notas_sistema.txt</li>
                    <li class="file-item">📄 diario.txt</li>
                    <li class="file-item">📄 contraseñas_importantes.txt</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- BARRA DE TAREAS -->
    <div id="taskbar">
        <button type="button">Inicio</button>
        <div id="clock">00:00</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
